name: aex
sha1: 261d15bdc6b929ddd776c4c3841fdf1fdbc2b5c4
options:
  basename: aex
  elf_path: aex.bin
  target_path: rom/overlay/aex.bin
  find_file_boundaries: False
  asm_path: asm
  symbol_addrs_path:
   - overlay/aex_symbol_addrs.txt
   - symbol_addrs.txt
   - sdk_symbol_addrs.txt
  reloc_addrs_path: aex_reloc_addrs.txt
  ld_script_path: linkers/aex.ld
  undefined_funcs_auto_path: linkers/aex_undefined_funcs_auto.main.txt
  undefined_syms_auto_path: linkers/aex_undefined_syms_auto.main.txt
  symbol_name_format: $VRAM_$SEG
segments:
  - name: aex
    type: code
    vram: 0x1F01E00
    start: 0x0
    bss_size: 0x80
    subsegments:
      - [0x0, databin, aex_overlay_header]
      - [0x80, asm, Event/stage/stg_apart_e1f]
      - [0x980, data, Event/stage/stg_apart_e1f_data]
      - { vram: 0x1F02F80, type: bss, name: Event/stage/stg_apart_e1f_bss }
  - [0x1180]
