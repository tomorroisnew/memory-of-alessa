name: aey
sha1: e5c4abaea73e3e19f4d22fa1bb5f93818b0dd46a
options:
  basename: aey
  elf_path: aey.bin
  target_path: rom/overlay/aey.bin
  find_file_boundaries: False
  asm_path: asm
  symbol_addrs_path:
   - overlay/aey_symbol_addrs.txt
   - symbol_addrs.txt
   - sdk_symbol_addrs.txt
  reloc_addrs_path: aey_reloc_addrs.txt
  ld_script_path: linkers/aey.ld
  undefined_funcs_auto_path: linkers/aey_undefined_funcs_auto.main.txt
  undefined_syms_auto_path: linkers/aey_undefined_syms_auto.main.txt
  symbol_name_format: $VRAM_$SEG
segments:
  - name: aey
    type: code
    vram: 0x1F01E00
    start: 0x0
    bss_size: 0x80
    subsegments:
      - [0x0, databin, aey_overlay_header]
      - [0x80, asm, Event/stage/stg_apart_e2f]
      - [0x3D80, data, Event/stage/stg_apart_e2f_data]
      - { vram: 0x1F07780, type: bss, name: Event/stage/stg_apart_e2f_bss }
  - [0x5980]
