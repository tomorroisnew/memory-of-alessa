name: aew
sha1: c867cbccef33b2f4541a3a3ffced05eb0934bf05
options:
  basename: aew
  elf_path: aew.bin
  target_path: rom/overlay/aew.bin
  find_file_boundaries: False
  asm_path: asm
  symbol_addrs_path:
   - overlay/aew_symbol_addrs.txt
   - symbol_addrs.txt
   - sdk_symbol_addrs.txt
  reloc_addrs_path: aew_reloc_addrs.txt
  ld_script_path: linkers/aew.ld
  undefined_funcs_auto_path: linkers/aew_undefined_funcs_auto.main.txt
  undefined_syms_auto_path: linkers/aew_undefined_syms_auto.main.txt
  symbol_name_format: $VRAM_$SEG
segments:
  - name: aew
    type: code
    vram: 0x1F01E00
    start: 0x0
    subsegments:
      - [0x0, databin, aew_overlay_header]
      - [0x80, asm, Event/stage/stg_apart_e3fw]
      - [0x580, data, Event/stage/stg_apart_e3fw_data]
  - [0xA80]
